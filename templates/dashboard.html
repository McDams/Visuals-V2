<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Supervision Électroformage</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="wall">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">⌁</span>
          <div>
            <p class="brand-title">Supervision Électroformage</p>
            <p class="brand-sub" id="process-summary">Chargement du process...</p>
          </div>
        </div>
        <div class="status-cluster">
          <div class="conn-status" id="conn-status">
            <span class="conn-dot"></span>
            <span id="conn-label">Connexion...</span>
          </div>
          <div class="alert-pill" id="alert-pill" hidden>
            <span id="alert-pill-count">0</span> alerte(s)
          </div>
          <div class="clock">
            <span class="clock-date" id="clock-date">--</span>
            <span class="clock-time" id="clock-time">--:--:--</span>
          </div>
        </div>
      </header>

      <div class="alert-ticker" id="alert-ticker" hidden>
        <div class="ticker-track" id="alert-ticker-track"></div>
      </div>

      <section class="panel table-panel">
        <div class="panel-header">
          <div>
            <h2>Cuves</h2>
            <span class="panel-sub" id="table-subtitle">Chargement...</span>
          </div>
        </div>
        <div class="table-scroll">
          <table class="tank-table">
            <thead>
              <tr>
                <th>Cuve</th>
                <th>Statut</th>
                <th>Alerte</th>
                <th>Tendance</th>
                <th>Courant / Tension</th>
                <th>Noeud Gauche</th>
                <th>Noeud Droite</th>
                <th>Job</th>
                <th>Process</th>
                <th>Dernière mesure</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tank-table-body">
              <tr><td colspan="11" class="muted table-empty">Chargement des cuves...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>

    <div class="modal-backdrop" id="tank-modal-backdrop" hidden>
      <div class="tank-modal" role="dialog" aria-modal="true" aria-labelledby="tank-modal-title">
        <button class="modal-close" id="tank-modal-close" type="button" aria-label="Fermer">&times;</button>
        <div id="tank-modal-body"></div>
      </div>
    </div>

    <div class="alert-popover" id="alert-popover" hidden>
      <div class="alert-popover-header">
        <span id="alert-popover-title">Cuve</span>
        <button class="alert-popover-close" id="alert-popover-close" type="button" aria-label="Fermer">&times;</button>
      </div>
      <div class="alert-popover-body" id="alert-popover-body"></div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  </body>
</html>
