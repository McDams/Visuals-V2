<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Supervision Électroformage</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="wall">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">⌁</span>
          <div>
            <p class="brand-title">Supervision Électroformage</p>
            <p class="brand-sub" id="process-summary">Chargement du process...</p>
          </div>
        </div>
        <div class="status-cluster">
          <div class="conn-status" id="conn-status">
            <span class="conn-dot"></span>
            <span id="conn-label">Connexion...</span>
          </div>
          <div class="alert-pill" id="alert-pill" hidden>
            <span id="alert-pill-count">0</span> alerte(s)
          </div>
          <div class="clock">
            <span class="clock-date" id="clock-date">--</span>
            <span class="clock-time" id="clock-time">--:--:--</span>
          </div>
        </div>
      </header>

      <div class="alert-ticker" id="alert-ticker" hidden>
        <div class="ticker-track" id="alert-ticker-track"></div>
      </div>

      <main class="tank-grid" id="tank-grid">
        <p class="muted">Chargement des cuves...</p>
      </main>

      <section class="panel">
        <div class="panel-header">
          <h2>Alertes</h2>
          <span class="panel-sub" id="alerts-subtitle">Chargement...</span>
        </div>
        <div class="alerts-list" id="alerts-list"></div>
      </section>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  </body>
</html>
